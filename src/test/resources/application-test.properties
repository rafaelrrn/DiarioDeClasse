# ============================================================
# Perfil de testes — substitui o perfil "local" (MySQL) por H2 em memória
# ============================================================

# H2 em memória — banco criado e destruído a cada execução de testes
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate cria o schema diretamente das entidades JPA (sem Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway desativado em testes: as migrations usam sintaxe MySQL (ENGINE=InnoDB)
# que não é compatível com H2. O schema é gerado pelo ddl-auto=create-drop.
spring.flyway.enabled=false

# JWT — chave estática para testes (facilita geração de tokens de teste)
jwt.secret=test-secret-key-for-unit-and-integration-tests-only

# Log reduzido em testes
logging.level.root=WARN
logging.level.com.diario.de.classe=INFO
