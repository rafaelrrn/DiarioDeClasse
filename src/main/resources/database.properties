#Configurań§es de ConexŃo do Banco de Dados MySQL
db.diario.de.classe.connection.string = ${DIARIO_DE_CLASSE_DB_HOST_URL}${DIARIO_DE_CLASSE_DB_NAME}${DIARIO_DE_CLASSE_DB_EXTRA_PARAMS} 
spring.datasource.url = ${db.diario.de.classe.connection.string}
spring.datasource.username=${DIARIO_DE_CLASSE_DB_USER}
spring.datasource.password=${DIARIO_DE_CLASSE_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto = update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
server.error.include-message= always
spring.jpa.show-sql=false

# Configurań§es do Tomcat Connection Pool
spring.datasource.type=org.apache.tomcat.jdbc.pool.DataSource
spring.datasource.tomcat.initial-size=5
spring.datasource.tomcat.max-active=10
spring.datasource.tomcat.max-idle=5
spring.datasource.tomcat.min-idle=2
spring.datasource.tomcat.validation-query=SELECT 1
spring.datasource.tomcat.test-on-borrow=true
spring.datasource.tomcat.test-while-idle=true
spring.datasource.tomcat.time-between-eviction-runs-millis=5000